<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>English Mastery Engine v5.5</title>
    <style>
        :root { 
            --main: #4A90E2; --success: #27AE60; --wrong: #E74C3C; --bg: #F4F7F9; --card: #FFFFFF; --lock: #94A3B8;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --header-h: 54px;
        }
        
        body { 
            font-family: 'PingFang SC', system-ui; background: var(--bg); margin: 0; 
            overflow: hidden; position: fixed; width: 100%; height: 100%;
            overscroll-behavior: none; -webkit-touch-callout: none;
        }

        .header { 
            background: var(--main); color: white; padding: var(--safe-top) 15px 0; 
            height: var(--header-h); display: flex; justify-content: space-between; align-items: center; 
            position: relative; z-index: 2000; 
        }

        .nav-tabs { display: flex; background: rgba(0,0,0,0.1); border-radius: 20px; padding: 3px; }
        .nav-tab { padding: 6px 15px; border-radius: 18px; font-size: 13px; cursor: pointer; }
        .nav-tab.active { background: white; color: var(--main); font-weight: bold; }

        .container { 
            max-width: 600px; margin: 0 auto; 
            height: calc(100% - var(--header-h) - var(--safe-top));
            padding: 10px 15px var(--safe-bottom);
            display: flex; flex-direction: column; box-sizing: border-box;
        }

        #view-plan { display: flex; flex-direction: column; height: 100%; gap: 10px; }

        .quiz-view { 
            background: var(--card); border-radius: 24px; padding: 15px; 
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; order: 1;
        }

        .plan-essentials { flex: 0 0 auto; display: flex; flex-direction: column; gap: 8px; order: 2; padding-bottom: 5px; }

        .sonic-capsule { 
            background: #EBF4FF; width: 110px; height: 44px; border-radius: 22px; 
            display: flex; align-items: center; justify-content: center; gap: 4px; 
            cursor: pointer; border: 2px solid var(--main); transition: 0.2s; 
        }
        .sonic-capsule.playing .wave-bar { animation: wave 0.5s infinite ease-in-out alternate; }
        .wave-bar { width: 3px; background: var(--main); border-radius: 2px; height: 10px; }
        @keyframes wave { from { height: 6px; } to { height: 20px; } }
        
        .word-input { 
            border: none; border-bottom: 4px solid #E2E8F0; font-size: 34px; width: 85%; 
            text-align: center; outline: none; margin: 15px 0; color: var(--main); 
            font-weight: bold; background: transparent; border-radius: 0; -webkit-appearance: none;
        }
        .word-input:read-only { opacity: 0.5; }
        .word-input.correct { color: var(--success); border-bottom-color: var(--success); }
        .word-input.error { color: var(--wrong); border-bottom-color: var(--wrong); animation: shake 0.4s; }
        
        .answer-hint { font-size: 24px; color: var(--wrong); font-weight: bold; margin-top: 5px; background: #FFF5F5; padding: 5px 15px; border-radius: 10px; border: 2px dashed var(--wrong); }
        
        /* 列表锁定样式 */
        .collapse-box { background: white; border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .collapse-box.locked { opacity: 0.5; pointer-events: none; filter: grayscale(0.8); }
        .collapse-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: bold; color:#475569; }
        .collapse-content { display: none; max-height: 20vh; overflow-y: auto; border-top: 1px solid #EEE; -webkit-overflow-scrolling: touch; }
        .collapse-content.show { display: block; }
        
        .word-item { padding: 10px 15px; border-bottom: 1px solid #F7FAFC; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .btn-mini { padding: 4px 8px; font-size: 11px; background: #FFF; border: 1px solid #CBD5E1; border-radius: 6px; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header">
    <select id="termSelect" onchange="switchTerm()" style="background:none; border:none; color:white; font-weight:bold; font-size:16px; outline:none;">
        <option value="3-1">Grade 3 Up</option><option value="3-2">Grade 3 Down</option>
        <option value="4-1">Grade 4 Up</option><option value="4-2">Grade 4 Down</option>
    </select>
    <div class="nav-tabs">
        <div class="nav-tab active" id="tab-plan" onclick="switchTab('plan')">Plan</div>
        <div class="nav-tab" id="tab-all" onclick="switchTab('all')">Lib</div>
    </div>
</div>

<div class="container">
    <div id="view-plan">
        <div id="quiz-box" class="quiz-view">
            <div id="cn-hint" style="font-size: 24px; font-weight: bold; color: #1E293B;">Click to Start</div>
            <div id="encourage-msg" style="font-size: 13px; color: var(--main); margin: 6px 0; height: 18px;"></div>
            <div id="playBtn" class="sonic-capsule" onclick="handlePlayClick()">
                <div class="wave-bar" style="animation-delay: 0s;"></div><div class="wave-bar" style="animation-delay: 0.1s;"></div>
                <div class="wave-bar" style="animation-delay: 0.2s;"></div><div class="wave-bar" style="animation-delay: 0.3s;"></div>
            </div>
            <input type="text" id="main-input" class="word-input" placeholder="..." autocomplete="off" autocapitalize="off" spellcheck="false">
            <div id="hint-box"></div><div id="feedback" style="height:30px; font-weight:bold; font-size:20px;"></div>
        </div>

        <div class="plan-essentials">
            <div style="display:flex; justify-content:space-between; align-items:center; background:white; padding:10px 15px; border-radius:15px; border-left:5px solid var(--main);">
                <div><span style="font-size: 11px; color: #94A3B8;">Progress</span><br><b id="progress-text" style="font-size: 16px; color: var(--main);">0 / 0</b></div>
                <div style="text-align: right;"><span style="font-size: 11px; color: #94A3B8;">Streak</span><br><span style="color: #FF4500; font-weight: bold; font-size: 16px;"><span id="streak-count">0</span> Days</span></div>
            </div>

            <div id="collapse-container" class="collapse-box">
                <div class="collapse-header" onclick="manualToggle()">
                    <span>📘 Today's List</span>
                    <span id="lock-status" style="font-size: 11px; color: #94A3B8;">🔓 Ready</span>
                </div>
                <div id="today-content" class="collapse-content">
                    <div id="today-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="view-all" class="hidden" style="height: 100%; overflow-y: auto;">
        <div id="full-list-container"></div>
    </div>
</div>

<script>
const DEFAULT_DICT = {
    "3-1": {
        "U1": [{en:"I",cn:"我"},{en:"am",cn:"是"},{en:"hello",cn:"你好"}],
        "U2": [{en:"morning",cn:"早晨"},{en:"name",cn:"名字"},{en:"please",cn:"请"}]
    }
};

let DICT_DB = JSON.parse(localStorage.getItem('JX_CUSTOM_DICT') || JSON.stringify(DEFAULT_DICT));
let appData = JSON.parse(localStorage.getItem('JX_ENGINE_V95_SONIC') || '{"streak":0, "curTerm":"3-1", "termSessions":{}}');

let currentSession = { tasks: [], idx: 0 };
let wrongQueue = [], localWrongCount = 0, isReviewMode = false, isLocked = false;

function initApp() {
    document.getElementById('termSelect').value = appData.curTerm;
    loadTermSession(appData.curTerm);
    updateUI(); renderTodayList(); renderQuiz();
}

function loadTermSession(term) {
    if (!appData.termSessions[term]) {
        let allPool = [];
        Object.values(DICT_DB[term] || {}).forEach(u => allPool = allPool.concat(u));
        appData.termSessions[term] = { tasks: allPool.sort(() => Math.random() - 0.5).slice(0, 15), idx: 0 };
    }
    currentSession = appData.termSessions[term];
}

// --- 自动聚焦与锁定逻辑 ---
function handlePlayClick() {
    const input = document.getElementById('main-input');
    // iOS 关键点 1：用户点击瞬间聚焦，激活键盘
    input.focus(); 
    // 设为只读以防止播报时用户输入导致异常，但保持 focus 状态键盘不收起
    input.readOnly = true; 
    
    // 锁定 Today's List
    lockList(true);
    startDictation();
}

function startDictation() {
    const tasks = isReviewMode ? wrongQueue : currentSession.tasks;
    if(currentSession.idx >= tasks.length) {
        if(!isReviewMode && wrongQueue.length > 0) {
            isReviewMode = true; currentSession.idx = 0; alert("Review Missed Words"); startDictation();
        } else { finishSession(); }
        return;
    }
    
    const wordObj = tasks[currentSession.idx];
    const btn = document.getElementById('playBtn');
    btn.classList.add('playing');
    
    const audio = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(wordObj.en)}&type=2`);
    audio.onended = () => {
        btn.classList.remove('playing');
        document.getElementById('cn-hint').innerText = wordObj.cn;
        // iOS 关键点 2：播报结束，恢复可写，此时键盘已在活动状态
        const input = document.getElementById('main-input');
        input.readOnly = false;
        input.focus(); 
    };
    audio.play();
}

function handleInput(e) {
    const val = e.target.value.trim().toLowerCase();
    const tasks = isReviewMode ? wrongQueue : currentSession.tasks;
    const target = tasks[currentSession.idx].en.toLowerCase();
    
    e.target.classList.remove('error');

    if(val === target) {
        e.target.classList.add('correct'); 
        document.getElementById('feedback').innerText = "Correct!";
        currentSession.idx++; 
        localWrongCount = 0;

        setTimeout(() => { 
            e.target.value = "";
            e.target.classList.remove('correct');
            document.getElementById('feedback').innerText = "";
            document.getElementById('hint-box').innerHTML = "";
            renderQuiz(); 
            // 解锁一次以便更新显示，下一题开始时会重新锁定
            lockList(false); 
            startDictation(); 
        }, 600);
    } else if (val.length >= target.length) {
        triggerError(e.target, target);
    }
}

function triggerError(el, target) {
    el.classList.add('error');
    const tasks = isReviewMode ? wrongQueue : currentSession.tasks;
    if(!isReviewMode && !wrongQueue.find(w => w.en === tasks[currentSession.idx].en)) {
        wrongQueue.push(tasks[currentSession.idx]);
    }
    localWrongCount++; 
    if(localWrongCount >= 2) { 
        document.getElementById('hint-box').innerHTML = `<div class="answer-hint">${target}</div>`; 
    }
}

function lockList(lock) {
    isLocked = lock;
    const container = document.getElementById('collapse-container');
    const status = document.getElementById('lock-status');
    if(lock) {
        container.classList.add('locked');
        status.innerText = "🔒 Locked";
        document.getElementById('today-content').classList.remove('show');
    } else {
        container.classList.remove('locked');
        status.innerText = "🔓 Ready";
    }
}

function manualToggle() {
    if(isLocked) return; // 锁定状态下点击无效
    document.getElementById('today-content').classList.toggle('show');
}

// --- 基础逻辑 ---
function renderQuiz() {
    const tasks = isReviewMode ? wrongQueue : currentSession.tasks;
    document.getElementById('progress-text').innerText = `${currentSession.idx} / ${tasks.length} ${isReviewMode ? '(Review)' : ''}`;
}

function finishSession() {
    document.getElementById('quiz-box').innerHTML = `<h2>Perfect!</h2><button onclick="location.reload()" style="padding:10px 20px;">Finish</button>`;
    appData.streak++; save(); lockList(false);
}

function switchTab(tab) {
    document.getElementById('view-plan').className = tab === 'plan' ? '' : 'hidden';
    document.getElementById('view-all').className = tab === 'all' ? '' : 'hidden';
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
}

function renderTodayList() {
    document.getElementById('today-list').innerHTML = currentSession.tasks.map(w => `<div class="word-item"><b>${w.en}</b><span>${w.cn}</span></div>`).join('');
}

function save() { localStorage.setItem('JX_ENGINE_V95_SONIC', JSON.stringify(appData)); }
function updateUI() { document.getElementById('streak-count').innerText = appData.streak; }
function switchTerm() { appData.curTerm = document.getElementById('termSelect').value; appData.termSessions = {}; location.reload(); }

document.getElementById('main-input').addEventListener('input', handleInput);
initApp();
</script>
</body>
</html>
