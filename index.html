<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小泽Pro 2.0 - 3-6年级全周期版</title>
    <style>
        :root { 
            --main: #4A90E2; --success: #27AE60; --wrong: #E74C3C; --bg: #F4F7F9; --card: #FFFFFF;
            --safe-top: env(safe-area-inset-top);
        }
        
        body { 
            font-family: 'PingFang SC', system-ui; background: var(--bg); margin: 0; 
            overflow: hidden; position: fixed; width: 100%; height: 100%;
        }

        .header { 
            background: var(--main); color: white; padding: var(--safe-top) 15px 0; 
            height: 54px; display: flex; justify-content: space-between; align-items: center; 
            z-index: 2000; position: relative;
        }

        .nav-tabs { display: flex; background: rgba(0,0,0,0.1); border-radius: 20px; padding: 2px; }
        .nav-tab { padding: 5px 12px; border-radius: 18px; font-size: 12px; cursor: pointer; }
        .nav-tab.active { background: white; color: var(--main); font-weight: bold; }

        .container { 
            max-width: 600px; margin: 0 auto; 
            height: calc(100% - 54px - var(--safe-top));
            padding: 10px 15px; display: flex; flex-direction: column; box-sizing: border-box;
        }

        #view-plan, #view-all { display: flex; flex-direction: column; height: 100%; gap: 10px; }

        .quiz-view { 
            background: var(--card); border-radius: 24px; padding: 20px; 
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .settings-bar { background: #E2E8F0; padding: 8px 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }

        .sonic-capsule { 
            background: #EBF4FF; width: 100px; height: 40px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; gap: 4px; border: 2px solid var(--main);
        }
        .sonic-capsule.playing .wave-bar { animation: wave 0.5s infinite ease-in-out alternate; }
        .wave-bar { width: 3px; background: var(--main); border-radius: 2px; height: 10px; }
        @keyframes wave { from { height: 6px; } to { height: 18px; } }
        
        .word-input { 
            border: none; border-bottom: 4px solid #E2E8F0; font-size: 32px; width: 85%; 
            text-align: center; outline: none; margin: 10px 0; color: var(--main); font-weight: bold; background: transparent;
        }
        .word-input.correct { color: var(--success); border-bottom-color: var(--success); }
        .word-input.error { color: var(--wrong); border-bottom-color: var(--wrong); animation: shake 0.4s; }
        
        .answer-hint { font-size: 24px; color: var(--wrong); font-weight: bold; background: #FFF5F5; padding: 5px 15px; border-radius: 10px; border: 2px dashed var(--wrong); margin-top: 10px; }
        
        .collapse-box { background: white; border-radius: 15px; overflow: hidden; }
        .collapse-box.locked { opacity: 0.5; pointer-events: none; }
        .collapse-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: bold; }
        .collapse-content { display: none; max-height: 25vh; overflow-y: auto; border-top: 1px solid #EEE; }
        .collapse-content.show { display: block; }
        
        .word-item { padding: 12px 15px; border-bottom: 1px solid #F7FAFC; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .mastery-tag { font-size: 10px; color: var(--main); font-weight: bold; }

        .lib-scroll { flex: 1; overflow-y: auto; background: white; border-radius: 20px; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .hidden { display: none !important; }
        .btn-mini { padding: 4px 8px; font-size: 10px; background: white; border: 1px solid #CBD5E1; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <select id="termSelect" onchange="switchTerm()" style="background:none; border:none; color:white; font-weight:bold; font-size:15px; outline:none;">
        <optgroup label="Grade 3"><option value="3-1">3rd Up</option><option value="3-2">3rd Down</option></optgroup>
        <optgroup label="Grade 4"><option value="4-1">4th Up</option><option value="4-2">4th Down</option></optgroup>
        <optgroup label="Grade 5"><option value="5-1">5th Up</option><option value="5-2">5th Down</option></optgroup>
        <optgroup label="Grade 6"><option value="6-1">6th Up</option><option value="6-2">6th Down</option></optgroup>
    </select>
    <div class="nav-tabs">
        <div class="nav-tab active" id="tab-plan" onclick="switchTab('plan')">Plan</div>
        <div class="nav-tab" id="tab-all" onclick="switchTab('all')">Library</div>
    </div>
</div>

<div class="container">
    <div id="view-plan">
        <div id="quiz-box" class="quiz-view">
            <div id="cn-hint" style="font-size: 24px; font-weight: bold;">Ready?</div>
            <div id="playBtn" class="sonic-capsule" onclick="handlePlayClick()">
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            </div>
            <input type="text" id="main-input" class="word-input" placeholder="..." autocomplete="off" autocapitalize="off" spellcheck="false" disabled>
            <div id="hint-box"></div><div id="feedback" style="height:24px; font-weight:bold;"></div>
        </div>

        <div class="plan-essentials">
            <div class="settings-bar">
                <div style="display:flex; gap:5px; align-items:center;">
                    <span>Range:</span>
                    <select id="startUnit" onchange="changeUnitRange()"></select>
                    <span>-</span>
                    <select id="endUnit" onchange="changeUnitRange()"></select>
                </div>
                <div style="display: flex; gap: 4px;">
                    <button class="btn-mini" onclick="backupUserData()">Backup</button>
                    <button class="btn-mini" onclick="document.getElementById('importFile').click()">Restore</button>
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="unifiedImport(event)">
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; background:white; padding:10px 15px; border-radius:15px; border-left:5px solid var(--main);">
                <div><span style="font-size: 10px; color: #94A3B8;">Progress</span><br><b id="progress-text" style="font-size: 15px; color: var(--main);">0 / 0</b></div>
                <div style="text-align: right;"><span style="font-size: 10px; color: #94A3B8;">Streak</span><br><span style="color: #FF4500; font-weight: bold; font-size: 15px;"><span id="streak-count">0</span> Days</span></div>
            </div>

            <div id="collapse-container" class="collapse-box">
                <div class="collapse-header" onclick="manualToggle()">
                    <span>📘 Today's List</span>
                    <span id="lock-status" style="font-size: 10px; color: #94A3B8;">🔓 Ready</span>
                </div>
                <div id="today-content" class="collapse-content"><div id="today-list"></div></div>
            </div>
        </div>
    </div>

    <div id="view-all" class="hidden">
        <div class="settings-bar" style="margin-bottom:8px;">
            <span>Library Management:</span>
            <div style="display: flex; gap:4px;">
                <button class="btn-mini" onclick="exportWordLibrary()">Exp Lib</button>
                <button class="btn-mini" onclick="document.getElementById('importFile').click()">Imp Lib</button>
            </div>
        </div>
        <div class="lib-scroll" id="full-list-container"></div>
        <button onclick="switchTab('plan')" style="margin-top:10px; padding:12px; background:var(--main); color:white; border:none; border-radius:12px; font-weight:bold;">Return to Plan</button>
    </div>
</div>

<script>
// --- 完整 3-6 年级数据框架 ---
const DEFAULT_DICT = {
    "3-1": { "U1": [{en:"I",cn:"我"},{en:"am",cn:"是"}], "U2": [{en:"hello",cn:"你好"}] },
    "3-2": { "U1": [{en:"boy",cn:"男孩"}], "U2": [{en:"girl",cn:"女孩"}] },
    "4-1": { "U1": [{en:"school",cn:"学校"}], "U2": [{en:"teacher",cn:"老师"}] },
    "4-2": { "U1": [{en:"music",cn:"音乐"}], "U2": [{en:"art",cn:"美术"}] },
    "5-1": { "U1": [{en:"young",cn:"年轻的"}], "U2": [{en:"funny",cn:"有趣的"}] },
    "5-2": { "U1": [{en:"eat",cn:"吃"}], "U2": [{en:"drink",cn:"喝"}] },
    "6-1": { "U1": [{en:"science",cn:"科学"}], "U2": [{en:"museum",cn:"博物馆"}] },
    "6-2": { "U1": [{en:"tall",cn:"高的"}], "U2": [{en:"short",cn:"矮的"}] }
};

let DICT_DB = JSON.parse(localStorage.getItem('JX_CUSTOM_DICT') || JSON.stringify(DEFAULT_DICT));
let appData = JSON.parse(localStorage.getItem('JX_ENGINE_V95_SONIC') || '{"mastery":{}, "streak":0, "curTerm":"3-1", "termSessions":{}, "unitRange":{}}');

let currentSession = { tasks: [], idx: 0 };
let wrongQueue = [], localWrongCount = 0, isReviewMode = false, isLocked = false;

function initApp() {
    document.getElementById('termSelect').value = appData.curTerm;
    updateUnitSelects();
    loadTermSession(appData.curTerm);
    updateUI(); renderTodayList(); renderQuiz();
}

// 自动生成单元选项
function updateUnitSelects() {
    const units = Object.keys(DICT_DB[appData.curTerm] || {});
    const opts = units.map(u => `<option value="${u}">${u}</option>`).join('');
    document.getElementById('startUnit').innerHTML = opts;
    document.getElementById('endUnit').innerHTML = opts;
    const range = appData.unitRange[appData.curTerm];
    if (range) {
        document.getElementById('startUnit').value = range.start;
        document.getElementById('endUnit').value = range.end;
    }
}

function loadTermSession(term) {
    if (!appData.termSessions[term]) {
        const units = Object.keys(DICT_DB[term] || {});
        const range = appData.unitRange[term] || { start: units[0], end: units[units.length-1] };
        const sIdx = units.indexOf(range.start), eIdx = units.indexOf(range.end);
        let pool = [];
        units.forEach((u, i) => { if(i >= sIdx && i <= eIdx) pool = pool.concat(DICT_DB[term][u]); });
        appData.termSessions[term] = { tasks: pool.sort(() => Math.random() - 0.5).slice(0, 15), idx: 0 };
    }
    currentSession = appData.termSessions[term];
}

// 听写与聚焦
function handlePlayClick() {
    const input = document.getElementById('main-input');
    input.disabled = false; input.focus();
    lockList(true);
    startDictation();
}

function startDictation() {
    const tasks = isReviewMode ? wrongQueue : currentSession.tasks;
    if(currentSession.idx >= tasks.length) {
        if(!isReviewMode && wrongQueue.length > 0) {
            isReviewMode = true; currentSession.idx = 0; alert("Review Errors"); startDictation();
        } else { finishSession(); }
        return;
    }
    const wordObj = tasks[currentSession.idx];
    document.getElementById('playBtn').classList.add('playing');
    const audio = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(wordObj.en)}&type=2`);
    audio.onended = () => {
        document.getElementById('playBtn').classList.remove('playing');
        document.getElementById('cn-hint').innerText = wordObj.cn;
        const input = document.getElementById('main-input');
        input.disabled = false; input.focus(); 
    };
    audio.play();
}

function handleInput(e) {
    const val = e.target.value.trim().toLowerCase();
    const tasks = isReviewMode ? wrongQueue : currentSession.tasks;
    const target = tasks[currentSession.idx].en.toLowerCase();
    
    if(val === target) {
        e.target.classList.add('correct');
        if(!isReviewMode && localWrongCount === 0) {
            appData.mastery[tasks[currentSession.idx].en] = (appData.mastery[tasks[currentSession.idx].en] || 0) + 1;
        }
        currentSession.idx++; localWrongCount = 0;
        setTimeout(() => { 
            e.target.value = ""; e.target.classList.remove('correct');
            document.getElementById('hint-box').innerHTML = "";
            renderQuiz(); lockList(false); startDictation(); 
        }, 600);
    } else if (val.length >= target.length) {
        triggerError(e.target, target);
    }
}

function triggerError(el, target) {
    el.classList.add('error');
    if(!isReviewMode && !wrongQueue.find(w => w.en === currentSession.tasks[currentSession.idx].en)) {
        wrongQueue.push(currentSession.tasks[currentSession.idx]);
    }
    localWrongCount++;
    if(localWrongCount >= 2) document.getElementById('hint-box').innerHTML = `<div class="answer-hint">${target}</div>`;
    setTimeout(() => el.classList.remove('error'), 400);
}

// 导出单词库
function exportWordLibrary() {
    const blob = new Blob([JSON.stringify(DICT_DB, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = "小泽_单词库.json"; a.click();
}

// 导出进度备份
function backupUserData() {
    const blob = new Blob([JSON.stringify(appData)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = "用户备份.json"; a.click();
}

// 统一导入逻辑
function unifiedImport(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (data["3-1"]) { // 单词库特征
                DICT_DB = data; localStorage.setItem('JX_CUSTOM_DICT', JSON.stringify(DICT_DB));
                alert("Word Library Updated!");
            } else if (data.mastery) { // 用户备份特征
                appData = data; save();
                alert("Progress Restored!");
            }
            location.reload();
        } catch(err) { alert("Import Failed: Invalid JSON"); }
    };
    reader.readAsText(file);
}

// 掌握度显示
function renderFullLibrary() {
    let html = "";
    const termData = DICT_DB[appData.curTerm] || {};
    Object.keys(termData).forEach(u => {
        html += `<div style="background:#f1f5f9; padding:8px 15px; font-size:11px; font-weight:bold;">${u}</div>`;
        html += termData[u].map(w => `
            <div class="word-item">
                <div><b>${w.en}</b> <small>${w.cn}</small></div>
                <div class="mastery-tag">M:${appData.mastery[w.en] || 0}</div>
            </div>`).join('');
    });
    document.getElementById('full-list-container').innerHTML = html;
}

// 通用辅助
function lockList(lock) {
    isLocked = lock;
    const container = document.getElementById('collapse-container');
    if(lock) {
        container.classList.add('locked'); document.getElementById('lock-status').innerText = "🔒 Locked";
        document.getElementById('today-content').classList.remove('show');
    } else {
        container.classList.remove('locked'); document.getElementById('lock-status').innerText = "🔓 Ready";
    }
}
function manualToggle() { if(!isLocked) document.getElementById('today-content').classList.toggle('show'); }
function renderTodayList() {
    document.getElementById('today-list').innerHTML = currentSession.tasks.map((w, i) => `
        <div class="word-item">
            <span><b>${w.en}</b> <small>${w.cn}</small></span>
            <span>${i < currentSession.idx ? '✅' : '⏳'}</span>
        </div>`).join('');
}
function renderQuiz() {
    const tasks = isReviewMode ? wrongQueue : currentSession.tasks;
    document.getElementById('progress-text').innerText = `${currentSession.idx} / ${tasks.length} ${isReviewMode ? '(Review)' : ''}`;
}
function finishSession() {
    document.getElementById('quiz-box').innerHTML = `<h2>Well Done!</h2><button onclick="location.reload()" style="padding:10px 20px; border-radius:10px; border:none; background:var(--main); color:white;">New Plan</button>`;
    appData.streak++; save();
}
function switchTab(tab) {
    document.getElementById('view-plan').className = tab === 'plan' ? '' : 'hidden';
    document.getElementById('view-all').className = tab === 'all' ? '' : 'hidden';
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + (tab==='plan'?'plan':'all')).classList.add('active');
    if(tab==='all') renderFullLibrary();
}
function switchTerm() { appData.curTerm = document.getElementById('termSelect').value; appData.termSessions = {}; save(); location.reload(); }
function changeUnitRange() {
    appData.unitRange[appData.curTerm] = { start: document.getElementById('startUnit').value, end: document.getElementById('endUnit').value };
    appData.termSessions = {}; save(); location.reload();
}
function save() { localStorage.setItem('JX_ENGINE_V95_SONIC', JSON.stringify(appData)); }
function updateUI() { document.getElementById('streak-count').innerText = appData.streak; }

document.getElementById('main-input').addEventListener('input', handleInput);
initApp();
</script>
</body>
</html>
