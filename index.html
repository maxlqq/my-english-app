<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>English Mastery Engine v5.2</title>
    <style>
        :root { 
            --main: #4A90E2; --success: #27AE60; --wrong: #E74C3C; --bg: #F4F7F9; --card: #FFFFFF; --lock: #94A3B8; --warning: #F1C40F; 
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; 
            /* 使用 dvh 确保在 iOS 动态工具栏下依然是单屏 */
            height: 100dvh; 
            overflow: hidden; 
            background: var(--bg);
            font-family: 'PingFang SC', system-ui;
            -webkit-touch-callout: none;
        }

        /* 主容器使用 Flex 布局实现垂直拉伸 */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
        }

        .header { 
            background: var(--main); color: white; 
            padding: calc(var(--safe-top) + 8px) 15px 8px; 
            display: flex; justify-content: space-between; align-items: center; 
            flex-shrink: 0;
        }

        .nav-tabs { display: flex; background: rgba(0,0,0,0.1); border-radius: 20px; padding: 2px; }
        .nav-tab { padding: 4px 12px; border-radius: 18px; font-size: 12px; cursor: pointer; }
        .nav-tab.active { background: white; color: var(--main); font-weight: bold; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            overflow: hidden; /* 防止内部溢出导致整体滚动 */
        }

        /* 核心听写区域：占据主要剩余空间 */
        .quiz-view { 
            background: var(--card); border-radius: 20px; 
            flex: 1; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
            min-height: 0; /* Flex 子元素收缩关键 */
        }

        /* 底部信息区：高度自适应并保持在键盘上方 */
        .bottom-info {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: var(--safe-bottom);
        }

        .word-input { 
            border: none; border-bottom: 3px solid #E2E8F0; 
            font-size: 32px; width: 80%; text-align: center; 
            outline: none; margin: 10px 0; color: var(--main); 
            font-weight: bold; background: transparent;
            border-radius: 0; -webkit-appearance: none;
        }
        .word-input.correct { color: var(--success); border-bottom-color: var(--success); }
        .word-input.error { color: var(--wrong); border-bottom-color: var(--wrong); animation: shake 0.4s; }

        .settings-bar { 
            background: #E2E8F0; padding: 6px 10px; border-radius: 10px; 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 11px; color: #475569;
        }
        
        .plan-summary { 
            background: white; border-radius: 12px; padding: 8px 15px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        /* 紧凑型波纹按钮 */
        .sonic-capsule { 
            background: #EBF4FF; width: 90px; height: 38px; border-radius: 19px; 
            display: flex; align-items: center; justify-content: center; gap: 3px; 
            border: 2px solid var(--main); 
        }
        .wave-bar { width: 3px; background: var(--main); border-radius: 2px; height: 8px; }
        .sonic-capsule.playing .wave-bar { animation: wave 0.5s infinite ease-in-out alternate; }
        
        @keyframes wave { from { height: 4px; } to { height: 16px; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .hidden { display: none !important; }
        
        /* 针对 Library 视图的特殊处理，允许内部滚动 */
        #view-all { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <select id="termSelect" onchange="switchTerm()" style="background:none; border:none; color:white; font-weight:bold; font-size:15px; outline:none;">
            <optgroup label="Grade 3"><option value="3-1">3rd Up</option><option value="3-2">3rd Down</option></optgroup>
            <optgroup label="Grade 4"><option value="4-1">4th Up</option><option value="4-2">4th Down</option></optgroup>
            <optgroup label="Grade 5"><option value="5-1">5th Up</option><option value="5-2">5th Down</option></optgroup>
            <optgroup label="Grade 6"><option value="6-1">6th Up</option><option value="6-2">6th Down</option></optgroup>
        </select>
        <div class="nav-tabs">
            <div class="nav-tab active" id="tab-plan" onclick="switchTab('plan')">Daily</div>
            <div class="nav-tab" id="tab-all" onclick="switchTab('all')">Library</div>
        </div>
    </div>

    <div class="main-content">
        <div id="view-plan" style="display:contents;">
            <div id="quiz-box" class="quiz-view">
                <div id="cn-hint" style="font-size: 22px; font-weight: bold; color: #1E293B;">Ready?</div>
                <div id="encourage-msg" style="font-size: 12px; color: var(--main); margin: 4px 0;">Tap speaker to start</div>
                
                <div id="playBtn" class="sonic-capsule" onclick="handlePlayClick()">
                    <div class="wave-bar"></div><div class="wave-bar"></div>
                    <div class="wave-bar"></div><div class="wave-bar"></div>
                </div>

                <input type="text" id="main-input" class="word-input" placeholder="..." autocomplete="off" autocapitalize="off" spellcheck="false">
                
                <div id="hint-box"></div>
                <div id="feedback" style="height:24px; font-weight:bold; font-size:18px; color:var(--success);"></div>
            </div>

            <div class="bottom-info">
                <div class="settings-bar">
                    <div style="display:flex; gap:5px;">
                        <select id="startUnit" onchange="changeUnitRange()"></select>
                        <span>-</span>
                        <select id="endUnit" onchange="changeUnitRange()"></select>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-mini" onclick="backupData()">Exp</button>
                        <button class="btn-mini" onclick="triggerImportAll()">Imp</button>
                    </div>
                </div>

                <div class="plan-summary">
                    <div><b id="progress-text" style="font-size: 14px; color: var(--main);">0 / 0</b></div>
                    <div style="text-align: right;"><span id="streak-count" style="color: #FF4500; font-weight: bold; font-size: 14px;">0</span> Days Streak</div>
                </div>
            </div>
        </div>

        <div id="view-all" class="hidden">
            <input type="text" id="libSearch" class="search-box" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;" placeholder="Search..." oninput="renderFullList()">
            <div id="full-list-container"></div>
        </div>
    </div>
    
    <input type="file" id="importFile" class="hidden" accept=".json" onchange="restoreData(event)">
</div>

<script>
// --- 保留原逻辑不变，仅针对 UI 和 键盘 进行增强 ---
const PRAISE_LIST = ["Amazing!", "Brilliant!", "Excellent!", "Perfect!", "Well done!", "Spot on!"];
const DEFAULT_DICT = { "3-1": { "U1": [{en:"I",cn:"我"},{en:"am",cn:"是"},{en:"hello",cn:"你好"}], "U2": [{en:"morning",cn:"早晨"},{en:"name",cn:"名字"}] } };

let DICT_DB = JSON.parse(localStorage.getItem('JX_CUSTOM_DICT') || JSON.stringify(DEFAULT_DICT));
let appData = JSON.parse(localStorage.getItem('JX_ENGINE_V95_SONIC') || '{"mastery":{}, "lastSeen":{}, "planLimit":15, "lastDate":"", "streak":0, "curTerm":"3-1", "curve":[], "voiceEngine":"auto", "termSessions":{}, "unitRange":{}}');

let currentSession = { tasks: [], idx: 0 };
let isReplayed = false, wrongQueue = [], audioCache = {}, sessionLog = { total: 0, firstPass: 0, errors: {}, startTime: null };
let hasShownHint = false, localWrongCount = 0;

function initApp() {
    const today = new Date().toLocaleDateString();
    document.getElementById('termSelect').value = appData.curTerm;
    if(appData.lastDate !== today) { appData.lastDate = today; appData.termSessions = {}; }
    updateUnitSelects();
    loadTermSession(appData.curTerm);
    updateUI(); renderQuiz();
    
    // 自动聚焦监听：防止 iOS 点击空白处失去焦点导致键盘收回
    document.addEventListener('touchend', (e) => {
        if(e.target.id !== 'main-input' && e.target.closest('#playBtn')) return;
        // 如果正在听写中，且没点击到其他输入框，强制保持焦点
        if(!document.getElementById('main-input').disabled && currentSession.idx < currentSession.tasks.length) {
            // 注意：这里不要在所有点击中执行 focus，否则会导致无法点击 select，仅在特定场景使用
        }
    });
}

function handlePlayClick() {
    const input = document.getElementById('main-input');
    // 核心：在用户点击的瞬间，同步获取焦点，这是唤起 iOS 键盘的唯一凭证
    input.disabled = false;
    input.focus();
    
    if(currentSession.idx < currentSession.tasks.length) {
        isReplayed = true;
        startDictation();
    }
}

function startDictation() {
    const currentWord = currentSession.tasks[currentSession.idx].en;
    speakWord(currentWord, () => {
        const input = document.getElementById('main-input');
        input.disabled = false;
        document.getElementById('cn-hint').innerText = currentSession.tasks[currentSession.idx].cn;
        // 播放结束后再次确保焦点
        input.focus();
    });
}

function handleInput(e) {
    const val = e.target.value.trim().toLowerCase();
    const target = currentSession.tasks[currentSession.idx].en.toLowerCase();
    e.target.classList.remove('error');

    if(val === target) {
        e.target.classList.add('correct'); 
        document.getElementById('feedback').innerText = PRAISE_LIST[Math.floor(Math.random()*PRAISE_LIST.length)];
        
        // 逻辑处理
        if(!isReplayed && localWrongCount === 0 && !hasShownHint) sessionLog.firstPass++;
        appData.mastery[target] = (appData.mastery[target]||0) + 1;
        currentSession.idx++; 
        save();
        
        // 自动切下一题，并保持键盘
        setTimeout(() => { 
            renderQuiz(); 
            startDictation(); 
        }, 600);
    } else if (val.length >= target.length || (val.length > 0 && !target.startsWith(val))) {
        e.target.classList.add('error');
        localWrongCount++;
        if(localWrongCount >= 2) {
            hasShownHint = true;
            document.getElementById('hint-box').innerHTML = `<div style="color:var(--wrong); font-weight:bold; font-size:20px; border:1px dashed var(--wrong); padding:5px; margin-top:5px;">${target}</div>`;
        }
    }
}

function renderQuiz() {
    const input = document.getElementById('main-input');
    if(currentSession.idx >= currentSession.tasks.length) {
        document.getElementById('quiz-box').innerHTML = `<h3>Finished!</h3><button onclick="location.reload()" class="btn-mini" style="padding:10px 20px">Next Session</button>`;
        return;
    }
    input.value = ""; input.className = "word-input";
    document.getElementById('cn-hint').innerText = "???";
    document.getElementById('feedback').innerText = "";
    document.getElementById('hint-box').innerHTML = "";
    document.getElementById('progress-text').innerText = `${currentSession.idx + 1} / ${currentSession.tasks.length}`;
    localWrongCount = 0; hasShownHint = false;
}

// 辅助逻辑
function updateUnitSelects() {
    const units = Object.keys(DICT_DB[appData.curTerm] || {});
    const opts = units.map(u => `<option value="${u}">${u}</option>`).join('');
    document.getElementById('startUnit').innerHTML = opts;
    document.getElementById('endUnit').innerHTML = opts;
}
function loadTermSession(term) {
    const units = Object.keys(DICT_DB[term] || {});
    let all = [];
    units.forEach(u => all = all.concat(DICT_DB[term][u]));
    currentSession.tasks = all.slice(0, appData.planLimit);
    sessionLog.total = currentSession.tasks.length;
}
function speakWord(word, onEnd) {
    const btn = document.getElementById('playBtn');
    btn.classList.add('playing');
    const audio = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=2`);
    audio.onended = () => { btn.classList.remove('playing'); if(onEnd) onEnd(); };
    audio.play().catch(() => { if(onEnd) onEnd(); btn.classList.remove('playing'); });
}
function switchTab(tab) {
    document.getElementById('view-plan').style.display = tab === 'plan' ? 'contents' : 'none';
    document.getElementById('view-all').classList.toggle('hidden', tab !== 'all');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.id === 'tab-'+tab));
}
function save() { localStorage.setItem('JX_ENGINE_V95_SONIC', JSON.stringify(appData)); }
function updateUI() { document.getElementById('streak-count').innerText = appData.streak; }

document.getElementById('main-input').addEventListener('input', handleInput);
initApp();
</script>
</body>
</html>
